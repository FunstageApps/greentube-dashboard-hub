<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Greentube · Dashboards</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #eef2ff; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 40px;
      background: radial-gradient(ellipse 120% 80% at 50% 110%, rgba(34,197,94,.13) 0%, transparent 60%), #090d18;
    }
    .card {
      background: rgba(9,13,24,.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 40px 44px;
      width: 100%; max-width: 520px;
      box-shadow: 0 8px 48px rgba(0,0,0,.6), 0 0 0 1px rgba(34,197,94,.06);
    }
    .logo { text-align: center; margin-bottom: 22px; }
    .logo-text { font-size: 13px; font-weight: 700; letter-spacing: .2em; color: #22c55e; text-shadow: 0 0 14px rgba(34,197,94,.8), 0 0 4px rgba(34,197,94,.5); }
    .subtitle { font-size: 12px; color: #64748b; text-align: center; margin-bottom: 26px; }

    /* Login */
    .login-form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: #475569; }
    .field input {
      background: rgba(8,12,24,.7); border: 1px solid rgba(255,255,255,.1); border-radius: 9px;
      padding: 11px 14px; color: #eef2ff; font-size: 13px; font-family: inherit; outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: rgba(34,197,94,.5); }
    .field input::placeholder { color: #334155; }
    .btn {
      margin-top: 4px; padding: 12px; background: #22c55e; border: none; border-radius: 9px;
      color: #052e16; font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background .15s, transform .1s;
    }
    .btn:hover { background: #16a34a; }
    .btn:active { transform: scale(.98); }
    .error { font-size: 12px; color: #f87171; text-align: center; min-height: 15px; }

    /* Hub links */
    .links { display: flex; flex-direction: column; gap: 10px; }
    .link {
      display: flex; align-items: center; gap: 11px; padding: 12px 16px;
      background: rgba(8,12,24,.55); border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
      text-decoration: none; color: #cbd5e1; font-size: 13px;
      transition: border-color .18s, background .18s;
    }
    .link:hover { border-color: rgba(34,197,94,.5); background: rgba(34,197,94,.07); }
    .link:hover .arrow { transform: translateX(4px); }
    .icon  { font-size: 16px; flex-shrink: 0; }
    .name  { flex: 1; }
    .arrow { transition: transform .18s; color: #475569; font-size: 13px; }
    .live  { width: 7px; height: 7px; border-radius: 50%; background: #10b981; animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  </style>
</head>
<body>

  <!-- LOGIN CARD -->
  <div class="card" id="login-card">
    <div class="logo"><span class="logo-text">GREENTUBE</span></div>
    <p class="subtitle">Sign in to continue</p>
    <div class="login-form">
      <div class="field">
        <label>USERNAME</label>
        <input type="text" id="u" autocomplete="username" placeholder="Username" spellcheck="false">
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="p" autocomplete="current-password" placeholder="••••••••">
      </div>
      <p class="error" id="err"></p>
      <button class="btn" id="login-btn">Sign in</button>
    </div>
  </div>

  <!-- HUB CARD (hidden until login) -->
  <div class="card" id="hub-card" style="display:none">
    <div class="logo"><span class="logo-text">GREENTUBE</span></div>
    <p class="subtitle">Select a dashboard</p>
    <div class="links" id="links"></div>
  </div>

  <script>
    // ============================================================
    //  CREDENTIALS
    // ============================================================
    var USERS = { 'dash': 'Gr33ntub3' };
    // ============================================================

    // ============================================================
    //  DASHBOARD LIST
    //  Add, remove or reorder entries freely.
    //  Fields: name, url, icon, live (optional: true = pulsing dot)
    // ============================================================
    var DASHBOARDS = [
      { name: "Game Supplier GGR split",         url: "https://greentube.app.n8n.cloud/webhook/dashboard-ui?data=/webhook/ggr-dashboard",  icon: "📊" },
      { name: "Top 20 Games — Monthly NGR", url: "https://greentube.app.n8n.cloud/webhook/dashboard-ui?data=/webhook/top20-monthly", icon: "🎮" },
      { name: "Realtime Monitoring Main KPI's",  url: "https://greentube.app.n8n.cloud/webhook/dashboard-ui?data=/webhook/rmg-realtime",  icon: "📡", live: true },
      { name: "PSP Deposit Distribution",        url: "https://greentube.app.n8n.cloud/webhook/dashboard-ui?data=/webhook/psp-dashboard", icon: "💳" }
    ];
    // ============================================================

    function showHub() {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('hub-card').style.display = '';
    }

    // Restore session
    if (sessionStorage.getItem('gt_auth') === '1') { showHub(); }

    // Login handler
    function tryLogin() {
      var u = document.getElementById('u').value.trim();
      var p = document.getElementById('p').value;
      if (USERS[u] && USERS[u] === p) {
        sessionStorage.setItem('gt_auth', '1');
        showHub();
      } else {
        document.getElementById('err').textContent = 'Incorrect username or password.';
        document.getElementById('p').value = '';
        document.getElementById('p').focus();
      }
    }

    document.getElementById('login-btn').addEventListener('click', tryLogin);
    document.getElementById('u').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('p').focus(); });
    document.getElementById('p').addEventListener('keydown', function(e) { if (e.key === 'Enter') tryLogin(); });

    // Render dashboard links
    var c = document.getElementById('links');
    DASHBOARDS.forEach(function(d) {
      var a = document.createElement('a'); a.className = 'link'; a.href = d.url;
      a.innerHTML = '<span class="icon">' + d.icon + '</span><span class="name">' + d.name + '</span>' + (d.live ? '<span class="live"></span>' : '') + '<span class="arrow">→</span>';
      c.appendChild(a);
    });
  </script>
</body>
</html>
