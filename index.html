/* Soft green radial glow */
.scene::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 80%, rgba(34,197,94,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

.hub {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 200px;
  width: 100%;
}

.hcard {
  background: rgba(15, 24, 41, 0.82);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 20px;
  padding: 0 40px 36px;
  max-width: 520px;
  width: 100%;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow:
    0 0 0 1px rgba(34,197,94,0.08),
    0 32px 64px rgba(0,0,0,0.6),
    0 0 80px rgba(34,197,94,0.06);
}

/* ── Logo ── */
.logo-wrap {
  display: flex;
  justify-content: center;
  /* negative top margin so logo sits straddling the card top edge */
  margin-top: -30px;
  margin-bottom: 8px;
}

.logo-wrap img {
  width: 220px;
  height: auto;
  /* knock out the black background using screen blend */
  mix-blend-mode: screen;
  /* layered green glow: tight inner glow + wide outer halo */
  filter:
    drop-shadow(0 0 8px rgba(74, 222, 128, 0.9))
    drop-shadow(0 0 20px rgba(34, 197, 94, 0.75))
    drop-shadow(0 0 45px rgba(22, 163, 74, 0.55))
    drop-shadow(0 0 80px rgba(20, 120, 50, 0.35));
}

.logo-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(34,197,94,0.25), transparent);
  margin-bottom: 24px;
}

.htitle2 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .14em;
  color: #64748B;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-align: center;
}

.hsub2 {
  font-size: 12px;
  color: #475569;
  margin-bottom: 22px;
  text-align: center;
}

/* ── Links ── */
.dlink {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px;
  background: rgba(8,12,26,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 11px;
  margin-bottom: 9px;
  text-decoration: none;
  color: #CBD5E1;
  font-size: 13px;
  font-weight: 500;
  transition: border-color .2s, background .2s, color .2s;
  cursor: pointer;
}
.dlink:hover {
  border-color: rgba(34,197,94,0.45);
  background: rgba(34,197,94,0.05);
  color: #eef2ff;
}
.dlink:last-child { margin-bottom: 0; }

.dlink-icon {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-right: 11px;
}
.dlink-left { display: flex; align-items: center; }
.dlink-arrow { color: #334155; font-size: 16px; transition: color .2s, transform .2s; }
.dlink:hover .dlink-arrow { color: #22c55e; transform: translateX(3px); }

.ic-ggr   { background: rgba(79,142,247,0.12); color: #4f8ef7; }
.ic-games { background: rgba(139,92,246,0.12); color: #8b5cf6; }
.ic-rt    { background: rgba(16,185,129,0.12); color: #10b981; }
.ic-psp   { background: rgba(245,158,11,0.12); color: #f59e0b; }

.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #10b981;
  animation: pulse 2.5s ease-in-out infinite;
  margin-left: 7px;
  flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

/* login overlay */
.login-overlay {
  position: fixed; inset: 0;
  background: #090d18;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.login-card {
  background: rgba(9,13,24,.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px;
  padding: 40px 44px;
  width: 100%; max-width: 400px;
  box-shadow: 0 8px 48px rgba(0,0,0,.7), 0 0 0 1px rgba(99,179,237,.06);
}
.login-logo {
  text-align: center;
  margin-bottom: 28px;
}
.login-logo img { height: 32px; opacity: .9; }
.login-title {
  font-size: 13px; font-weight: 700; letter-spacing: .18em;
  color: #63b3ed; text-align: center; margin-bottom: 6px;
  text-transform: uppercase;
}
.login-sub {
  font-size: 12px; color: #475569; text-align: center; margin-bottom: 28px;
}
.login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.login-field label { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: #475569; text-transform: uppercase; }
.login-field input {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 9px;
  padding: 11px 14px;
  color: #eef2ff;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
}
.login-field input:focus { border-color: rgba(99,179,237,.5); }
.login-btn {
  width: 100%; margin-top: 8px;
  background: #63b3ed;
  color: #090d18;
  font-size: 13px; font-weight: 700; letter-spacing: .06em;
  border: none; border-radius: 9px;
  padding: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .2s;
}
.login-btn:hover { opacity: .85; }
.login-error {
  font-size: 12px; color: #fc8181;
  text-align: center; margin-top: 10px;
  min-height: 16px;
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-title">Greentube</div>
      <div class="login-sub">Dashboard Hub — sign in to continue</div>
    </div>
    <div class="login-field">
      <label for="gt_user">Username</label>
      <input type="text" id="gt_user" placeholder="username" autocomplete="username">
    </div>
    <div class="login-field">
      <label for="gt_pass">Password</label>
      <input type="password" id="gt_pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="gtLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<script>
(function(){
  if(sessionStorage.getItem('gt_auth')==='ok'){
    document.getElementById('loginOverlay').style.display='none';
  }
  document.getElementById('gt_pass').addEventListener('keydown',function(e){
    if(e.key==='Enter') gtLogin();
  });
  document.getElementById('gt_user').addEventListener('keydown',function(e){
    if(e.key==='Enter') document.getElementById('gt_pass').focus();
  });
})();
function gtLogin(){
  var u=document.getElementById('gt_user').value.trim();
  var p=document.getElementById('gt_pass').value;
  if(u==='dash'&&p==='Gr33ntub3'){
    sessionStorage.setItem('gt_auth','ok');
    document.getElementById('loginOverlay').style.display='none';
  } else {
    document.getElementById('loginError').textContent='Invalid username or password.';
    document.getElementById('gt_pass').value='';
  }
}
</script>

<div class="bg-characters"></div>

<div class="scene">
  <div class="hub">
